workflows:
  plugador-profile:
    name: Plugador Atômico — Profile APK
    max_build_duration: 60

    environment:
      node: 18
      java: 17
      vars:
        LANG: "en_US.UTF-8"
        LC_ALL: "en_US.UTF-8"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true

    scripts:
      - name: Clonar Codec2
        script: |
          rm -rf android/app/src/main/cpp/codec2
          git clone https://github.com/drowe67/codec2.git \
            android/app/src/main/cpp/codec2

      - name: Instalar dependências Node
        script: |
          npm install

      - name: Gerar debug keystore
        script: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Gerar bundle JS
        script: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Setup Gradle 8.1.1
        script: |
          wget https://services.gradle.org/distributions/gradle-8.1.1-bin.zip
          unzip -q gradle-8.1.1-bin.zip
          export PATH=$PWD/gradle-8.1.1/bin:$PATH
          gradle --version

      - name: Build APK Profile
        script: |
          export PATH=$PWD/gradle-8.1.1/bin:$PATH
          cd android
          gradle wrapper --gradle-version 8.1.1
          chmod +x gradlew
          ./gradlew assembleProfile --no-daemon --stacktrace
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

    artifacts:
      - android/app/build/outputs/apk/profile/*.apk

    publishing:
      email:
        recipients:
          - loggergray@gmail.com
        notify:
          success: true
          failure: true
