
workflows:
  plugador-profile:
    name: Plugador Atômico — Profile APK
    max_build_duration: 60

    environment:
      node: v18.0.0

    scripts:
      - name: Inicializar submódulo Codec2
        script: |
          git submodule update --init --recursive

      - name: Instalar dependências Node
        script: |
          npm install

      - name: Instalar dependências extras
        script: |
          npm install react-native-audio-recorder-player react-native-fs

      - name: Garantir que o gradlew existe e tem permissão
        script: |
          # Se o gradlew não foi commitado, gera ele agora via gradle wrapper
          if [ ! -f android/gradlew ]; then
            cd android
            gradle wrapper --gradle-version 8.0.1
            cd ..
          fi
          chmod +x android/gradlew

      - name: Build APK Profile
        script: |
          cd android
          ./gradlew assembleProfile \
            --no-daemon \
            --stacktrace

    artifacts:
      - android/app/build/outputs/apk/profile/*.apk
