workflows:
  plugador-profile:
    name: Plugador Atômico — Profile APK
    max_build_duration: 60

    environment:
      node: 18
      java: 17
      vars:
        LANG: "en_US.UTF-8"
        LC_ALL: "en_US.UTF-8"

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: '*'
          include: true

    scripts:
      - name: Clonar Codec2
        script: |
          rm -rf android/app/src/main/cpp/codec2
          git clone https://github.com/drowe67/codec2.git \
            android/app/src/main/cpp/codec2

      - name: Gerar codebooks do Codec2
        script: |
          CODEC2_DIR=android/app/src/main/cpp/codec2
          BUILD_DIR=$CODEC2_DIR/build_host

          # Compila o gerador de codebooks para o host (macOS)
          mkdir -p $BUILD_DIR
          cd $BUILD_DIR
          cmake .. -DCMAKE_BUILD_TYPE=Release
          make generate_codebook
          cd -

          GEN=$BUILD_DIR/src/generate_codebook
          CB=$CODEC2_DIR/codebook
          OUT=$BUILD_DIR/src

          # Gera cada codebook usando redirecionamento de saída (sintaxe correta do generate_codebook)
          $GEN lsp_cb        $CB/lsp1.txt $CB/lsp2.txt $CB/lsp3.txt $CB/lsp4.txt \
                             $CB/lsp5.txt $CB/lsp6.txt $CB/lsp7.txt $CB/lsp8.txt \
                             $CB/lsp9.txt $CB/lsp10.txt > $OUT/codebook.c

          $GEN lsp_cbd       $CB/dlsp1.txt $CB/dlsp2.txt $CB/dlsp3.txt $CB/dlsp4.txt \
                             $CB/dlsp5.txt $CB/dlsp6.txt $CB/dlsp7.txt $CB/dlsp8.txt \
                             $CB/dlsp9.txt $CB/dlsp10.txt > $OUT/codebookd.c

          $GEN lsp_cbjmv     $CB/lspjmv1.txt $CB/lspjmv2.txt $CB/lspjmv3.txt > $OUT/codebookjmv.c

          $GEN ge_cb         $CB/gecb.txt > $OUT/codebookge.c

          $GEN newamp1vq_cb  $CB/train_120_1.txt $CB/train_120_2.txt > $OUT/codebooknewamp1.c

          $GEN newamp1_energy_cb $CB/newamp1_energy_q.txt > $OUT/codebooknewamp1_energy.c

      - name: Instalar dependências Node
        script: |
          npm install

      - name: Gerar debug keystore
        script: |
          keytool -genkey -v \
            -keystore android/app/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Gerar bundle JS
        script: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Setup Gradle 8.1.1
        script: |
          wget https://services.gradle.org/distributions/gradle-8.1.1-bin.zip
          unzip -q gradle-8.1.1-bin.zip
          export PATH=$PWD/gradle-8.1.1/bin:$PATH
          gradle --version

      - name: Build APK Profile
        script: |
          export PATH=$PWD/gradle-8.1.1/bin:$PATH
          cd android
          gradle wrapper --gradle-version 8.1.1
          chmod +x gradlew
          ./gradlew assembleProfile --no-daemon --stacktrace
          find app/build/outputs/apk -name "*.apk" -exec ls -lh {} \;

    artifacts:
      - android/app/build/outputs/apk/profile/*.apk

    publishing:
      email:
        recipients:
          - loggergray@gmail.com
        notify:
          success: true
          failure: true
