
workflows:
  plugador-profile:
    name: Plugador Atômico — Profile APK
    max_build_duration: 60

    environment:
      node: v18.0.0

    scripts:
      - name: Inicializar submódulo Codec2
        script: |
          git submodule update --init --recursive

      - name: Instalar dependências Node
        script: |
          npm install

      - name: Gerar estrutura Android completa via React Native
        script: |
          # Cria um projeto temporário para pegar a estrutura Android gerada pelo RN
          npx react-native init TempApp --version 0.73.0 --skip-install
          
          # Copia os arquivos de infraestrutura do Gradle que estavam faltando
          cp TempApp/android/gradlew android/
          cp TempApp/android/gradlew.bat android/
          cp -r TempApp/android/gradle android/
          cp TempApp/android/build.gradle android/build.gradle.rn
          cp TempApp/android/settings.gradle android/settings.gradle
          
          # Limpa o projeto temporário
          rm -rf TempApp
          
          # Garante permissão de execução
          chmod +x android/gradlew

      - name: Instalar dependências extras
        script: |
          npm install react-native-audio-recorder-player react-native-fs

      - name: Build APK Profile
        script: |
          cd android
          ./gradlew assembleProfile \
            --no-daemon \
            --stacktrace

    artifacts:
      - android/app/build/outputs/apk/profile/*.apk
