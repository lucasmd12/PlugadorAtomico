workflows:
  plugador-profile:
    name: Plugador Atômico — Profile APK
    max_build_duration: 60

    environment:
      node: v18.0.0
      vars:
        ANDROID_NDK_VERSION: "25.2.9519653"
        BUILD_THREADS: "4"

    scripts:
      - name: Inicializar submódulo Codec2
        script: |
          git submodule update --init --recursive

      - name: Instalar dependências Node
        script: |
          npm install

      - name: Instalar dependências extras do React Native
        script: |
          npm install react-native-audio-recorder-player react-native-fs

      - name: Compilar Codec2 via NDK para ARM64
        script: |
          cd android/app/src/main/cpp
          mkdir -p build && cd build
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI="arm64-v8a" \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DCODEC2_BUILD_EXAMPLES=OFF \
            -DCODEC2_BUILD_TESTS=OFF
          make -j$BUILD_THREADS

      - name: Build APK Profile (sem keystore)
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleProfile \
            --no-daemon \
            --stacktrace

    artifacts:
      - android/app/build/outputs/apk/profile/*.apk
